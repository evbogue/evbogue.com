<!doctype html>
<html lang="en">
  <head>
    <title>evbogue.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="description" content="Writing by Everett Bogue." />
    <link rel="alternate" type="application/rss+xml" href="/feed.xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <style>
      :root {
        --sans: Inter, system-ui, sans-serif;
        --accent: #0077b6;
        --accent-bg: #f7f7f7;
        --border: #d8dee4;
        --text: #2f343f;
        --text-light: #626b7a;
        --standard-border-radius: 4px;
      }

      html {
        font-family: var(--sans);
      }

      body {
        border-top: 6px solid var(--text);
      }

      body > header {
        padding-block: 0.85rem 1.25rem;
      }

      body > main {
        padding-top: 1.5rem;
      }

      body > footer {
        padding-block: 1.5rem 2rem;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: 1.75rem;
      }

      h2 {
        font-size: 1.45rem;
      }

      h3 {
        font-size: 1.25rem;
      }

      h4,
      h5,
      h6 {
        font-size: 1.1rem;
      }

      nav a,
      a {
        font-weight: 700;
      }

      nav a:first-child {
        letter-spacing: -0.04em;
      }

      nav form {
        margin: 0;
      }

      nav input[type="search"] {
        max-width: 12rem;
      }

      .brand-short,
      .mobile-search {
        display: none;
      }

      .kicker,
      .meta,
      .river-header h2 {
        color: var(--text-light);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .section-header {
        border-bottom: 3px solid var(--text);
        margin-bottom: 1.35rem;
        padding-bottom: 1.1rem;
      }

      .section-header h1 {
        font-size: clamp(1.9rem, 4vw, 2.6rem);
        letter-spacing: -0.045em;
        line-height: 1;
        margin-bottom: 0.75rem;
      }

      .section-header .dek,
      .lead-story > p:not(.kicker) {
        color: var(--text-light);
        font-size: clamp(1.15rem, 3vw, 1.45rem);
        margin-bottom: 0.85rem;
      }

      .hero-links,
      .river-header {
        align-items: baseline;
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem 0.85rem;
        margin-bottom: 0;
      }

      .lead-story,
      .entry,
      .intro {
        border-bottom: 1px solid var(--border);
        margin-bottom: 1.15rem;
        padding-bottom: 1.15rem;
      }

      .intro {
        float: none;
        margin-inline: 0;
        width: auto;
      }

      @media (min-width: 800px) {
        .home-layout {
          display: grid;
          gap: 2rem;
          grid-template-columns: minmax(0, 1fr) 16rem;
        }

        .intro {
          align-self: start;
          border-left: 1px solid var(--border);
          border-bottom: 0;
          padding-bottom: 0;
          padding-left: 1.25rem;
          position: sticky;
          top: 1rem;
        }
      }

      .lead-story h2 {
        font-size: clamp(1.55rem, 3vw, 2.1rem);
        letter-spacing: -0.04em;
        line-height: 1.05;
        margin-bottom: 0.45rem;
      }

      .lead-story p,
      .entry p {
        margin-bottom: 0.75rem;
      }

      .entry h2 {
        letter-spacing: -0.035em;
        line-height: 1;
      }

      .intro img {
        aspect-ratio: 1;
        border-radius: 50%;
        height: 4.5rem;
        object-fit: cover;
        width: 4.5rem;
      }

      .site-stats {
        border-block: 1px solid var(--border);
        display: flex;
        gap: 1.5rem;
        margin: 0.75rem 0;
        padding: 0.75rem 0;
      }

      .site-stats div,
      .site-stats dd {
        margin: 0;
      }

      .site-stats dt {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .site-stats dd,
      .sidebar-subscribe small {
        color: var(--text-light);
      }

      .archive-list {
        border-top: 2px solid var(--text);
        list-style: none;
        padding: 0;
      }

      .archive-list li {
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 1rem;
        justify-content: space-between;
        padding: 0.45rem 0;
      }

      .archive-list time {
        color: var(--text-light);
        flex: 0 0 auto;
      }

      @media (max-width: 640px) {
        body > header {
          padding-block: 0.7rem 1rem;
        }

        body > main {
          padding-top: 1.1rem;
        }

        .section-header h1 {
          font-size: 2rem;
        }

        .section-header {
          margin-bottom: 1rem;
          padding-bottom: 1rem;
        }

        .section-header .dek {
          font-size: 1.08rem;
        }

        .lead-story h2 {
          font-size: 1.65rem;
        }

        .lead-story,
        .entry,
        .intro {
          margin-bottom: 1rem;
          padding-bottom: 1rem;
        }

        .brand-full,
        .desktop-search {
          display: none;
        }

        .brand-short,
        .mobile-search {
          display: inline-block;
        }

        .mobile-search {
          position: relative;
        }

        .mobile-search summary {
          color: var(--accent);
          cursor: pointer;
          font-weight: 700;
          list-style: none;
        }

        .mobile-search summary::-webkit-details-marker {
          display: none;
        }

        .mobile-search form {
          background: var(--bg);
          border: 1px solid var(--border);
          display: flex;
          gap: 0.25rem;
          padding: 0.5rem;
          position: absolute;
          right: 0;
          top: 100%;
          width: min(20rem, 82vw);
          z-index: 10;
        }

        .mobile-search input[type="search"] {
          min-width: 0;
        }

        .archive-list li {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><strong><a href="/"><span class="brand-full">evbogue.com</span><span class="brand-short">ev</span></a></strong></li>
        </ul>
        <ul>
          <li><a href="/posts">Archive</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/feed.xml">RSS</a></li>
          <li class="desktop-search">
            <form role="search" action="/" method="GET">
              <input id="nav-search-input" type="search" name="q" placeholder="Search archive" aria-label="Search the archive">
              <button type="submit">Search</button>
            </form>
          </li>
          <li>
            <details class="mobile-search">
              <summary>Search</summary>
              <form role="search" action="/" method="GET">
                <input id="mobile-search-input" type="search" name="q" placeholder="Search archive" aria-label="Search the archive">
                <button type="submit">Go</button>
              </form>
            </details>
          </li>
        </ul>
      </nav>
      <script>
        const navSearchInput = document.getElementById('nav-search-input')
        const mobileSearchInput = document.getElementById('mobile-search-input')
        const currentQuery = new URLSearchParams(window.location.search).get('q')
        if (navSearchInput && currentQuery) navSearchInput.value = currentQuery
        if (mobileSearchInput && currentQuery) mobileSearchInput.value = currentQuery
      </script>
    </header>
    <main>
